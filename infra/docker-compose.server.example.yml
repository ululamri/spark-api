services:
  api:
    build:
      context: ..
      dockerfile: Dockerfile
    container_name: spark-api
    env_file:
      - ../config/env.server.example
    ports:
      - "${SPARK_API_PORT:-8787}:8787"
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_started
    restart: unless-stopped

  postgres:
    image: postgres:16-alpine
    container_name: spark-postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-spark}
      POSTGRES_USER: ${POSTGRES_USER:-spark}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-spark_change_me}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - spark_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-spark} -d ${POSTGRES_DB:-spark}"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  minio:
    image: minio/minio:latest
    container_name: spark-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-spark_minio}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-spark_minio_change_me}
    ports:
      - "${MINIO_API_PORT:-9000}:9000"
      - "${MINIO_CONSOLE_PORT:-9001}:9001"
    volumes:
      - spark_minio_data:/data
    restart: unless-stopped

volumes:
  spark_postgres_data:
  spark_minio_data:
