services:
  postgres:
    image: postgres:16-alpine
    container_name: spark-postgres
    environment:
      POSTGRES_DB: spark
      POSTGRES_USER: spark
      POSTGRES_PASSWORD: spark_dev_password
    ports:
      - "5432:5432"
    volumes:
      - spark_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U spark -d spark"]
      interval: 5s
      timeout: 5s
      retries: 10

  minio:
    image: minio/minio:latest
    container_name: spark-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: spark_minio
      MINIO_ROOT_PASSWORD: spark_minio_password
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - spark_minio_data:/data

volumes:
  spark_postgres_data:
  spark_minio_data:
